<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Uzair Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#080808;--bg2:#0e0e0e;--lime:#d4ff00;--pink:#ff2d78;--blue:#00cfff;--white:#f0f0f0;--muted:#555;--border:#1f1f1f}
  body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
  #login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:380px;position:relative;overflow:hidden}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--lime),var(--blue))}
  .login-title{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--lime);margin-bottom:24px}
  .login-h{font-size:1.6rem;font-weight:700;margin-bottom:32px}
  input{width:100%;background:#111;border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:12px}
  input:focus{border-color:var(--lime)}
  .btn{width:100%;background:var(--lime);color:#000;border:none;border-radius:100px;padding:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s;margin-top:4px}
  .btn:hover{opacity:.85}
  .btn.danger{background:var(--pink);color:#fff}
  .btn.small{width:auto;padding:6px 14px;font-size:.75rem;border-radius:100px}
  .error-msg{color:var(--pink);font-size:.8rem;margin-top:8px;font-family:'DM Mono',monospace}

  #app{display:none;max-width:1100px;margin:0 auto;padding:32px 24px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;flex-wrap:wrap;gap:16px}
  .logo{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--white)}
  .logo span{color:var(--lime)}
  .header-actions{display:flex;gap:10px;align-items:center}

  .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:40px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
  .stat-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .stat-value{font-size:2rem;font-weight:700;color:var(--white)}
  .stat-value.accent{color:var(--lime)}

  .section-label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .badge{background:var(--pink);color:#fff;border-radius:100px;padding:2px 8px;font-size:.65rem;font-family:'DM Mono',monospace}
  .badge.green{background:var(--lime);color:#000}

  .messages-list{display:flex;flex-direction:column;gap:12px}
  .msg-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;transition:border-color .2s;position:relative}
  .msg-card.unread{border-color:rgba(212,255,0,.35)}
  .msg-card.unread::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--lime);border-radius:3px 0 0 3px}
  .msg-meta{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .msg-from{font-weight:600;font-size:.95rem}
  .msg-email{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);margin-top:2px}
  .msg-time{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted)}
  .msg-body{color:#ccc;font-size:.88rem;line-height:1.7;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;white-space:pre-wrap}
  .msg-actions{display:flex;gap:8px;margin-top:12px}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem}

  .loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <p class="login-title">// admin panel</p>
    <h1 class="login-h">Welcome back, Uzair.</h1>
    <input type="password" id="keyInput" placeholder="Enter admin key" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Unlock Dashboard</button>
    <p class="error-msg" id="loginErr"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">
  <header>
    <div class="logo">uzair<span>.dev</span> / <span>admin</span></div>
    <div class="header-actions">
      <button class="btn small" onclick="markAllRead()">Mark all read</button>
      <button class="btn small danger" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="stats-row" id="statsRow">
    <div class="loading"><div class="spinner"></div> loading stats…</div>
  </div>

  <p class="section-label">Messages <span class="badge" id="unreadBadge" style="display:none"></span></p>
  <div class="messages-list" id="messagesList">
    <div class="loading"><div class="spinner"></div> loading messages…</div>
  </div>
</div>

<script>
  let ADMIN_KEY = '';

  function doLogin() {
    const key = document.getElementById('keyInput').value.trim();
    if (!key) return;
    ADMIN_KEY = key;
    loadDashboard();
  }

  function logout() {
    ADMIN_KEY = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
    document.getElementById('keyInput').value = '';
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(path, {
      ...opts,
      headers: { 'x-admin-key': ADMIN_KEY, 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    return res;
  }

  async function loadDashboard() {
    document.getElementById('loginErr').textContent = '';
    const [statsRes, msgsRes] = await Promise.all([
      apiFetch('/api/admin/stats'),
      apiFetch('/api/admin/messages')
    ]);

    if (statsRes.status === 401 || msgsRes.status === 401) {
      document.getElementById('loginErr').textContent = 'Wrong key. Try again.';
      return;
    }

    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    const stats = await statsRes.json();
    const data  = await msgsRes.json();

    renderStats(stats);
    renderMessages(data);
  }

  function renderStats({ visitors, unread_messages }) {
    const el = document.getElementById('statsRow');
    el.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Visits</div>
        <div class="stat-value accent">${visitors.total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unique IPs</div>
        <div class="stat-value">${visitors.unique_visitors}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last 24h</div>
        <div class="stat-value">${visitors.last_24h}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last 7 days</div>
        <div class="stat-value">${visitors.last_7d}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unread Msgs</div>
        <div class="stat-value accent">${unread_messages}</div>
      </div>
    `;
  }

  function renderMessages({ messages, unread }) {
    const badge = document.getElementById('unreadBadge');
    if (unread > 0) { badge.textContent = unread + ' new'; badge.style.display = ''; }
    else badge.style.display = 'none';

    const el = document.getElementById('messagesList');
    if (!messages.length) {
      el.innerHTML = '<div class="empty">No messages yet. Share your portfolio! 🚀</div>';
      return;
    }

    el.innerHTML = messages.map(m => `
      <div class="msg-card ${m.read ? '' : 'unread'}" id="msg-${m.id}">
        <div class="msg-meta">
          <div>
            <div class="msg-from">${escHtml(m.name)} ${!m.read ? '<span class="badge green">NEW</span>' : ''}</div>
            <div class="msg-email"><a href="mailto:${escHtml(m.email)}" style="color:var(--lime);text-decoration:none">${escHtml(m.email)}</a></div>
          </div>
          <div class="msg-time">${formatDate(m.created_at)}</div>
        </div>
        <div class="msg-body">${escHtml(m.message)}</div>
        <div class="msg-actions">
          ${!m.read ? `<button class="btn small" onclick="markRead(${m.id})">Mark read</button>` : ''}
          <button class="btn small danger" onclick="deleteMsg(${m.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function markRead(id) {
    await apiFetch(`/api/admin/messages/${id}/read`, { method: 'POST' });
    const card = document.getElementById(`msg-${id}`);
    if (card) {
      card.classList.remove('unread');
      card.querySelector('.msg-from').innerHTML = card.querySelector('.msg-from').textContent.replace('NEW','').trim();
      const btn = card.querySelector('button.btn.small:not(.danger)');
      if (btn) btn.remove();
    }
    loadDashboard();
  }

  async function markAllRead() {
    await apiFetch('/api/admin/messages/read-all', { method: 'POST' });
    loadDashboard();
  }

  async function deleteMsg(id) {
    if (!confirm('Delete this message?')) return;
    await apiFetch(`/api/admin/messages/${id}`, { method: 'DELETE' });
    document.getElementById(`msg-${id}`)?.remove();
    const remaining = document.querySelectorAll('.msg-card').length;
    if (!remaining) document.getElementById('messagesList').innerHTML = '<div class="empty">No messages yet. Share your portfolio! 🚀</div>';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(str) {
    const d = new Date(str + 'Z');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
